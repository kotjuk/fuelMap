<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Топливо в Туле</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FuelMap">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        header {
            background: #111827;
            color: white;
            padding: 16px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
        }

        .subtitle {
            margin-top: 6px;
            color: #d1d5db;
            font-size: 14px;
        }

        .toolbar {
            padding: 12px;
            background: white;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #e5e7eb;
        }

        input, select {
            padding: 10px;
            font-size: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        input {
            flex: 1;
        }

        #count {
            padding: 12px;
            font-size: 14px;
            color: #4b5563;
        }

        .station {
            background: white;
            margin: 10px 12px;
            padding: 14px;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
        }

        .station-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 4px;
        }

        .address {
            color: #4b5563;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .prices {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .price {
            background: #eef2ff;
            color: #1e3a8a;
            padding: 6px 9px;
            border-radius: 999px;
            font-size: 14px;
        }

        .meta {
            color: #6b7280;
            font-size: 13px;
        }

        .report {
            margin-top: 10px;
            padding: 8px;
            background: #fef3c7;
            border-radius: 8px;
            font-size: 14px;
        }

    .report-button {
        margin-top: 10px;
        margin-bottom: 10px;
        width: 100%;
        padding: 11px;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-size: 15px;
        cursor: pointer;
    }

    .report-button:active {
        transform: scale(0.99);
    }

    .report-empty {
        background: #f3f4f6;
    }

    .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.55);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        z-index: 1000;
    }

    .modal {
        width: 100%;
        max-width: 520px;
        background: white;
        border-radius: 18px 18px 0 0;
        padding: 18px;
        box-sizing: border-box;
        max-height: 90vh;
        overflow: auto;
    }

    .modal h2 {
        margin-top: 0;
    }

    .modal-address {
        color: #4b5563;
        font-size: 14px;
        margin-bottom: 14px;
    }

    .modal label {
        display: block;
        margin-bottom: 12px;
        font-size: 14px;
    }

    .modal select,
    .modal textarea {
        width: 100%;
        box-sizing: border-box;
        margin-top: 5px;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
    }

    .modal textarea {
        min-height: 70px;
        resize: vertical;
    }

    .modal-actions {
        display: flex;
        gap: 8px;
    }

    .modal-actions button {
        flex: 1;
        padding: 12px;
        border: 0;
        border-radius: 10px;
        background: #16a34a;
        color: white;
        font-size: 15px;
    }

    .modal-actions button.secondary {
        background: #6b7280;
    }

    .section-title {
    font-size: 13px;
    font-weight: bold;
    color: #374151;
    margin-bottom: 8px;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: .03em;
    }

    .charging-block {
        margin-top: 8px;
        margin-bottom: 10px;
        padding: 10px;
        background: #f8fafc;
        border-radius: 10px;
    }

    .charging-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .charge-badge {
        background: #ecfeff;
        color: #155e75;
        padding: 6px 9px;
        border-radius: 999px;
        font-size: 14px;
    }

    .report {
        margin-top: 10px;
        padding: 10px 12px;
        background: #fef3c7;
        border-radius: 10px;
        font-size: 14px;
    }

    .report-title {
        font-weight: bold;
        margin-bottom: 8px;
    }

    .report-line {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 2px 0;
    }

    .report-comment {
        margin-top: 8px;
        color: #4b5563;
    }

    .report-time {
        margin-top: 8px;
        color: #6b7280;
        font-size: 13px;
    }

    .report-empty {
        background: #f3f4f6;
    }

    .modal-note {
        margin-bottom: 12px;
        color: #6b7280;
        font-size: 14px;
    }

    .report-line small {
    color: #6b7280;
    font-weight: normal;
    margin-left: 4px;
    }
    
    </style>
</head>
<body>

<header>
    <h1>Топливо в Туле</h1>
    <div class="subtitle">Роснефть: цены и АЗС из API, наличие и очередь добавим следующим шагом</div>
</header>

<div class="toolbar">
    <input id="search" placeholder="Поиск по адресу или номеру АЗС">

    <select id="city">
        <option value="">Все места</option>
    </select>

    <select id="fuel">
        <option value="">Все виды</option>
        <option value="92">АИ-92</option>
        <option value="95">АИ-95</option>
        <option value="95_pulsar">95 Pulsar</option>
        <option value="100">АИ-100</option>
        <option value="diesel_summer">ДТ</option>
        <option value="diesel_pulsar_summer">ДТ Pulsar</option>
    </select>
</div>

<div id="count">Загрузка...</div>
<div id="list"></div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .catch(error => console.error('Service Worker error:', error));
    });
}
</script>

</body>
</html>
